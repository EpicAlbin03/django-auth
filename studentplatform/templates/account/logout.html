{% extends "base.html" %} {% block title %}Sign Out{% endblock %} {% block content %}
<div class="min-h-screen flex items-center justify-center bg-background">
  <c-card class="w-[400px]">
    <c-card.header>
      <c-card.title>Sign Out</c-card.title>
      <c-card.description> Are you sure you want to sign out? </c-card.description>
    </c-card.header>

    <form method="POST" action="{% url 'logout' %}">
      {% csrf_token %}
      <c-card.footer class="flex justify-between pt-6">
        <c-button variant="outline" type="button" onclick="window.history.back()">
          Cancel
        </c-button>
        <c-button type="submit"> Sign Out </c-button>
      </c-card.footer>
    </form>
  </c-card>
</div>
{% endblock %}
